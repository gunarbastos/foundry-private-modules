<div class="narrator-jukebox-micro" data-playing="{{isPlaying}}">
  <!-- Main Artwork Circle -->
  <div class="micro-artwork {{#if isPlaying}}pulsing{{/if}}">
    {{#if currentTrack.thumbnail}}
    <img src="{{currentTrack.thumbnail}}" alt="{{currentTrack.name}}">
    {{else}}
    <div class="micro-placeholder">
      <i class="fas fa-music"></i>
    </div>
    {{/if}}

    <!-- Playing Indicator Ring -->
    <div class="micro-ring {{#if isPlaying}}active{{/if}}"></div>

    <!-- Hover Overlay -->
    <div class="micro-overlay"></div>
  </div>

  <!-- Hover Controls (appear on hover) -->
  <div class="micro-controls">
    <button class="micro-btn" id="micro-prev" data-tooltip="Previous" data-tooltip-position="top">
      <i class="fas fa-step-backward"></i>
    </button>
    <button class="micro-btn main" id="micro-play-pause" data-tooltip="{{#if isPlaying}}Pause{{else}}Play{{/if}}" data-tooltip-position="top">
      <i class="fas {{#if isPlaying}}fa-pause{{else}}fa-play{{/if}}"></i>
    </button>
    <button class="micro-btn" id="micro-next" data-tooltip="Next" data-tooltip-position="top">
      <i class="fas fa-step-forward"></i>
    </button>
  </div>

  <!-- Expand Button (bottom-right corner) -->
  <button class="micro-expand" data-tooltip="Open Mini Player" data-tooltip-position="left">
    <i class="fas fa-expand"></i>
  </button>

  <!-- Ambience Layers Indicator (shows count when layers are active) -->
  {{#if ambienceLayerCount}}
  <div class="micro-ambience-indicator layers" data-tooltip="{{ambienceLayerCount}} ambience layer{{#if (gt ambienceLayerCount 1)}}s{{/if}} active" data-tooltip-position="left">
    <i class="fas fa-layer-group"></i>
    <span class="micro-layer-count">{{ambienceLayerCount}}</span>
  </div>
  {{/if}}
</div>
